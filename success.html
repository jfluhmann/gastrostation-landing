<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're In — Gastro Station</title>
    <meta name="description" content="Thank you for joining the Gastro Station waitlist. We'll be in touch soon!">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .success-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .success-content {
            max-width: 520px;
        }
        .success-icon {
            width: 72px;
            height: 72px;
            background: var(--green-bg);
            color: var(--green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 2rem;
        }
        .success-content h1 {
            font-size: clamp(2rem, 5vw, 2.75rem);
            margin-bottom: 1rem;
        }
        .success-content p {
            font-size: 1.05rem;
            color: var(--slate);
            line-height: 1.7;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <section class="success-page">
        <div class="success-content">
            <div class="success-icon">&#10003;</div>
            <h1>You're on the list.</h1>
            <p>Thanks for signing up for early access to Gastro Station. We're building something that'll make staying compliant a whole lot easier. We'll be in touch soon with updates.</p>
            <a href="/" class="btn btn-ghost">Back to Home</a>
        </div>
    </section>
</body>
</html>
